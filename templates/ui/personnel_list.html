{% extends 'ui/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Форма 1 — Персонал</h2>
  <a class="btn btn-primary" href="/forms/personnel/new/">+ Новый сотрудник</a>
</div>
<form class="card p-3 mb-3">
  <div class="row g-2">
    <div class="col-md-6"><input class="form-control" name="q" value="{{ q }}" placeholder="Поиск по ФИО, должности, примечанию"></div>
    <div class="col-md-3">
      <select class="form-select" name="status">
        <option value="">Все статусы</option>
        <option value="active" {% if status == 'active' %}selected{% endif %}>active</option>
        <option value="inactive" {% if status == 'inactive' %}selected{% endif %}>inactive</option>
      </select>
    </div>
    <div class="col-md-3"><button class="btn btn-outline-primary w-100">Фильтровать</button></div>
  </div>
</form>
<div class="card p-2">
  <table class="table table-hover align-middle mb-0">
    <thead><tr><th>ФИО</th><th>Должность</th><th>Вид занятости</th><th>Статус</th></tr></thead>
    <tbody>
      {% for item in items %}
      <tr>
        <td><a href="/forms/personnel/{{ item.id }}/">{{ item.full_name }}</a></td>
        <td>{{ item.position }}</td>
        <td>{{ item.employment_type }}</td>
        <td><span class="badge text-bg-light">{{ item.status }}</span></td>
      </tr>
      {% empty %}
      <tr><td colspan="4">Записи не найдены</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
