<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VOLPAS Lab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
  <aside class="sidebar p-3">
    <h5 class="mb-4">VOLPAS Lab</h5>
    <nav class="nav flex-column gap-1">
      <a class="nav-link" href="/">Дашборд</a>
      <a class="nav-link" href="/forms/personnel/">Форма 1 — Персонал</a>
      <a class="nav-link" href="/templates-registry/">Реестр шаблонов</a>
    </nav>
  </aside>
  <main class="flex-grow-1 p-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
