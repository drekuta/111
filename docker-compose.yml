version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: volopas
      POSTGRES_USER: volopas
      POSTGRES_PASSWORD: volopas
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    command: bash -lc "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - ./storage:/app/storage
    ports:
      - '8000:8000'
    environment:
      DEBUG: '1'
      SECRET_KEY: dev-secret
      DB_NAME: volopas
      DB_USER: volopas
      DB_PASSWORD: volopas
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db

volumes:
  pgdata:
